{{- if .Values.hfToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whisperx-fastapi.fullname" . }}-hf-token
  labels:
    {{- include "whisperx-fastapi.labels" . | nindent 4 }}
type: Opaque
data:
  hf-token: {{ .Values.hfToken | b64enc | quote }}
{{- end }}
---
{{- if .Values.mlis.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whisperx-fastapi.fullname" . }}-mlis
  labels:
    {{- include "whisperx-fastapi.labels" . | nindent 4 }}
type: Opaque
data:
  whisper-api-key: {{ .Values.mlis.whisper.apiKey | b64enc | quote }}
  diarization-api-key: {{ .Values.mlis.diarization.apiKey | b64enc | quote }}
{{- end }}
